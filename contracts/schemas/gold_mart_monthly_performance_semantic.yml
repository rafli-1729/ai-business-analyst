table: gold.mart_monthly_performance
description: High-level monthly business performance metrics. Use for trend analysis.
columns:
  month_start_date:
    type: DATE
    description: The first day of the month for the reporting period.
    examples: ["2017-01-01", "2018-05-01"]
  total_revenue:
    type: NUMERIC
    description: Total revenue (price + freight) for the month.
  total_orders:
    type: INTEGER
    description: Count of unique orders placed during the month.
  total_customers:
    type: INTEGER
    description: Count of unique customers who placed orders during the month.
  avg_order_value:
    type: NUMERIC
    description: Average revenue per order (total_revenue / total_orders).
