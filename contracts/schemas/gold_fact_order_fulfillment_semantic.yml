table: gold.fact_order_fulfillment
description: Table focused on order fulfillment, delivery performance, and customer satisfaction.
columns:
  order_id:
    type: TEXT
    description: Identifier for the order.
    examples: ["000229ec398224ef6ca0657da4fc703e"]
  customer_unique_id:
    type: TEXT
    description: Unique identifier for the customer (across multiple orders).
    examples: ["3818d81c6709e39d06b2738a8d3a2474"]
  customer_city:
    type: TEXT
    description: City name of the buyer (UTF-8 normalized, no accents).
    examples: ["Sao Paulo", "Rio de Janeiro", "Curitiba"]
  customer_state:
    type: TEXT
    description: Two-letter Brazilian state code (UF) of the buyer.
    examples: ["SP", "RJ", "MG", "RS", "PR", "BA"]
  seller_id:
    type: TEXT
    description: Identifier for the seller.
  seller_city:
    type: TEXT
    description: City name of the seller.
  seller_state:
    type: TEXT
    description: Two-letter Brazilian state code (UF) of the seller.
  order_status:
    type: TEXT
    description: Current status of the order.
    examples: ["delivered", "shipped", "canceled", "invoiced", "processing"]
  order_purchase_timestamp:
    type: TIMESTAMP
    description: Timestamp of when the order was placed.
  order_approved_at:
    type: TIMESTAMP
    description: Timestamp of payment approval.
  order_delivered_carrier_date:
    type: TIMESTAMP
    description: Timestamp of when the order was handed to the carrier.
  order_delivered_customer_date:
    type: TIMESTAMP
    description: Timestamp of actual delivery to the customer.
  order_estimated_delivery_date:
    type: TIMESTAMP
    description: Estimated delivery date promised to the customer.
  delivery_days_actual:
    type: INTEGER
    description: Actual days between purchase and delivery.
  delivery_days_estimated:
    type: INTEGER
    description: Estimated days for delivery at the time of purchase.
  processing_days:
    type: INTEGER
    description: Days between purchase and carrier pickup.
  is_late_delivery:
    type: BOOLEAN
    description: Flag indicating if the actual delivery happened after the estimated date.
    examples: [true, false]
  review_score:
    type: INTEGER
    description: Satisfaction score provided by the customer (1 to 5).
    examples: [1, 2, 3, 4, 5]
