table: gold.mart_customer_behavior
description: Analytical mart for customer profiling and retention analysis.
columns:
  customer_unique_id:
    type: TEXT
    description: Unique identifier for the customer.
    examples: ["0000366f3b9a7992bf8c76cfdf3221e2"]
  customer_city:
    type: TEXT
    description: City name of the customer (UTF-8 normalized).
    examples: ["Sao Paulo", "Rio de Janeiro", "Belo Horizonte"]
  customer_state:
    type: TEXT
    description: Two-letter Brazilian state code (UF) of the customer.
    examples: ["SP", "RJ", "MG", "PR", "SC", "RS"]
  first_purchase_at:
    type: TIMESTAMP
    description: Timestamp of the customer's first purchase.
  latest_purchase_at:
    type: TIMESTAMP
    description: Timestamp of the customer's most recent purchase.
  total_orders:
    type: INTEGER
    description: Total number of orders placed by this customer.
  total_items_bought:
    type: INTEGER
    description: Total number of items purchased across all orders.
  total_lifetime_value:
    type: NUMERIC
    description: Total revenue generated by this customer (LTV).
  avg_order_value:
    type: NUMERIC
    description: Average revenue per order for this customer.
  is_repeat_customer:
    type: BOOLEAN
    description: Flag indicating if the customer has placed more than one order.
    examples: [true, false]
