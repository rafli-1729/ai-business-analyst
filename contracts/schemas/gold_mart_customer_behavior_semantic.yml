table: gold.mart_customer_behavior
description: Customer-centric metrics and retention behavior.
columns:
  customer_unique_id:
    type: TEXT
    description: Unique identifier for the customer.
    examples: ['cu1', 'cu2', 'cu3', 'cu4', 'cu5']
  customer_state:
    type: TEXT
    description: Two-letter Brazilian state code.
    examples: ['SP', 'RJ', 'MG', 'RS', 'SC']
  first_purchase_at:
    type: TIMESTAMP
    description: Date of the first purchase.
    examples: ['2024-01-01', '2024-01-10', '2024-01-15', '2024-02-01', '2024-02-10']
  latest_purchase_at:
    type: TIMESTAMP
    description: Date of the most recent purchase.
    examples: ['2024-05-01', '2024-05-05', '2024-04-20', '2024-04-25', '2024-05-10']
  total_orders:
    type: INTEGER
    description: Count of total orders per customer.
    examples: [1, 5, 2, 1, 10]
  total_items_bought:
    type: INTEGER
    description: Count of total items bought.
    examples: [1, 7, 3, 1, 15]
  total_lifetime_value:
    type: NUMERIC
    description: Total revenue attributed to this customer.
    examples: [100.0, 500.0, 250.0, 80.0, 1200.0]
  avg_order_value:
    type: NUMERIC
    description: Average value per order.
    examples: [100.0, 100.0, 125.0, 80.0, 120.0]
  is_repeat_customer:
    type: BOOLEAN
    description: Indicates if the customer has made more than one purchase.
    examples: [false, true, true, false, true]
