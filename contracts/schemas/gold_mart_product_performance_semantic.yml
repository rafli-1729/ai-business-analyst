table: gold.mart_product_performance
description: Performance metrics for products and categories.
columns:
  product_id:
    type: TEXT
    description: Unique identifier for the product.
    examples: ["a388f2043ca885de714453e4fac616e2"]
  product_category_name:
    type: TEXT
    description: Normalized category name of the product.
    examples: ["Telefonia", "Ferramentas Jardim", "Utilidades Domesticas", "Esporte Lazer", "Beleza Saude"]
  total_revenue:
    type: NUMERIC
    description: Total revenue generated by the product.
  total_units_sold:
    type: INTEGER
    description: Total quantity of units sold for this product.
  avg_price:
    type: NUMERIC
    description: Average selling price of the product.
  avg_review_score:
    type: NUMERIC
    description: Average satisfaction score for the product.
  total_photos:
    type: INTEGER
    description: Number of photos available for the product in the catalog.
  product_weight_g:
    type: NUMERIC
    description: Weight of the product in grams.
