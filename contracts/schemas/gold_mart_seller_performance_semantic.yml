table: gold.mart_seller_performance
description: Performance metrics for sellers, including revenue and delivery quality.
columns:
  seller_id:
    type: TEXT
    description: Identifier for the seller.
    examples: ["0015a82c2db000af6aaaf3ae2ecb0532"]
  seller_city:
    type: TEXT
    description: City name of the seller (UTF-8 normalized).
    examples: ["Sao Paulo", "Santo Andre", "Campinas"]
  seller_state:
    type: TEXT
    description: Two-letter Brazilian state code (UF) of the seller.
    examples: ["SP", "RJ", "MG", "PR", "SC", "RS"]
  total_revenue:
    type: NUMERIC
    description: Total revenue generated by the seller.
  total_orders:
    type: INTEGER
    description: Total number of orders fulfilled by the seller.
  total_items_sold:
    type: INTEGER
    description: Total number of product items sold by the seller.
  avg_item_price:
    type: NUMERIC
    description: Average price of items sold by the seller.
  avg_review_score:
    type: NUMERIC
    description: Average customer review score for the seller's orders.
  late_delivery_rate:
    type: NUMERIC
    description: Proportion of orders delivered after the estimated date.
  active_since:
    type: TIMESTAMP
    description: Timestamp of the seller's first sale.
